<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>DH screenshot harness</title>
<style>
  html, body { margin: 0; padding: 24px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  body.light { background: #f4f5f7; }
  body.light ha-device-health { --card-background-color: #ffffff; --primary-background-color: #f4f5f7; }
  body.dark { background: #111318; }
  body.dark ha-device-health { --card-background-color: #1c1e26; --primary-background-color: #111318; }
  ha-device-health { display: block; width: 480px; }
</style>
</head>
<body>
<ha-device-health id="card"></ha-device-health>
<script>
  try { localStorage.setItem('ha-intro-dismissed-ha-device-health', '1'); } catch (e) {}
</script>
<script src="../../ha-device-health.js"></script>
<script>
(function () {
  const params = new URLSearchParams(location.search);
  const theme = params.get('theme') === 'dark' ? 'dark' : 'light';
  const tab = params.get('tab') || '';
  document.body.className = theme;
  const now = Date.now(); const h = 3600000;

  const bat = (id, name, level, agoH) => ({
    entity_id: 'sensor.' + id + '_battery', state: String(level),
    attributes: { friendly_name: name + ' Battery', device_class: 'battery', unit_of_measurement: '%' },
    last_changed: new Date(now - agoH * h).toISOString(), last_updated: new Date(now - agoH * h).toISOString(),
  });
  const ent = (eid, name, state, agoH, extra) => ({
    entity_id: eid, state,
    attributes: Object.assign({ friendly_name: name }, extra || {}),
    last_changed: new Date(now - agoH * h).toISOString(), last_updated: new Date(now - agoH * h).toISOString(),
  });

  const list = [
    bat('front_door_sensor', 'Front Door Sensor', 92, 1),
    bat('motion_hallway', 'Hallway Motion', 61, 3),
    bat('smoke_detector', 'Smoke Detector', 45, 6),
    bat('tv_remote', 'TV Remote', 27, 12),
    bat('water_leak_kitchen', 'Kitchen Leak Sensor', 14, 20),
    bat('window_bedroom', 'Bedroom Window Sensor', 6, 30),
    ent('light.living_room', 'Living Room Light', 'on', 0.2),
    ent('light.kitchen', 'Kitchen Light', 'off', 1),
    ent('switch.coffee_machine', 'Coffee Machine', 'off', 2),
    ent('switch.garden_pump', 'Garden Pump', 'unavailable', 40),
    ent('climate.bedroom', 'Bedroom Thermostat', 'heat', 0.5),
    ent('sensor.garage_temp', 'Garage Temperature', 'unavailable', 26, { unit_of_measurement: '°C' }),
    ent('sensor.living_room_temp', 'Living Room Temperature', '22.4', 0.1, { unit_of_measurement: '°C' }),
    ent('device_tracker.phone_maciej', 'Phone', 'home', 0.1, { source_type: 'router' }),
    ent('sensor.router_signal', 'Router Signal', '-52', 0.1, { unit_of_measurement: 'dBm' }),
  ];
  const states = {};
  list.forEach(s => { states[s.entity_id] = s; });

  const hass = {
    language: 'en',
    themes: { darkMode: theme === 'dark' },
    states,
    services: {},
    connection: { subscribeEvents: () => Promise.resolve(() => {}) },
    callWS: async () => ({}),
    callApi: async () => ({}),
    callService: async () => ({}),
  };

  const card = document.getElementById('card');
  card.setConfig({ type: 'custom:ha-device-health' });
  card.hass = hass;
  setTimeout(() => { card.hass = { ...hass }; }, 400);
  if (tab) {
    setTimeout(() => {
      try { card.shadowRoot.querySelector('[data-tab="' + tab + '"]').click(); } catch (e) {}
    }, 900);
  }
  const scrub = () => { try { card.shadowRoot && card.shadowRoot.querySelectorAll('#tip-banner, [class*="banner"], .donate-section').forEach(n => n.remove()); } catch (e) {} };
  setInterval(scrub, 150);
  setTimeout(() => { scrub(); document.title = 'DH-READY'; }, 1500);
})();
</script>
</body>
</html>
